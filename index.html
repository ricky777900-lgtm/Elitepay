<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elite Pay | Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@400;600;800&display=swap');
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; }
        .logo-font { font-family: 'Syncopate', sans-serif; letter-spacing: -1px; }
        .gold-gradient { background: linear-gradient(135deg, #f6d365 0%, #fda085 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .gold-bg { background: linear-gradient(135deg, #FFD700 0%, #B8860B 100%); }
        .glass-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); backdrop-filter: blur(12px); border-radius: 32px; }
        .tab-content { display: none; transition: all 0.3s ease; }
        .active { display: block; animation: fadeInUp 0.5s ease forwards; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .nav-blur { background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(20px); border-top: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="bg-black">

    <div id="auth-page" class="min-h-screen flex flex-col justify-center p-8">
        <div class="mb-12 text-center">
            <h1 class="logo-font text-3xl font-black gold-gradient">ELITE PAY</h1>
            <p class="text-[10px] tracking-[0.4em] text-zinc-500 mt-2 font-bold uppercase">Institutional Grade Platform</p>
        </div>
        <div class="glass-card p-8 space-y-6">
            <div class="space-y-2 text-center mb-4">
                <p class="text-xl font-bold">Welcome Back</p>
                <p class="text-xs text-zinc-500">Sign in to manage your holdings</p>
            </div>
            <input type="number" id="phone" placeholder="Phone Number" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none focus:border-yellow-500 text-sm">
            <input type="password" id="pass" placeholder="Password" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none focus:border-yellow-500 text-sm">
            <button onclick="login()" class="w-full gold-bg text-black font-black py-4 rounded-2xl shadow-xl shadow-yellow-500/20 uppercase text-xs tracking-widest">Access Account</button>
        </div>
    </div>

    <div id="main-app" class="hidden min-h-screen pb-24">
        <header class="p-6 flex justify-between items-center">
            <span class="logo-font text-lg font-black gold-gradient">ELITE</span>
            <div class="w-10 h-10 rounded-full border border-white/10 flex items-center justify-center bg-zinc-900 text-[10px] font-bold">VIP</div>
        </header>

        <section id="home" class="tab-content active p-6">
            <div class="glass-card p-8 bg-gradient-to-br from-zinc-900/50 to-transparent mb-8">
                <p class="text-[10px] text-zinc-500 font-bold uppercase tracking-widest mb-1">Total Portfolio Value</p>
                <h2 class="text-4xl font-black italic">₹250.00</h2>
                <div class="mt-8 flex gap-3">
                    <button onclick="showTab('orders')" class="flex-1 gold-bg text-black text-[10px] font-black py-3 rounded-xl uppercase">Market Orders</button>
                    <button class="flex-1 bg-white/5 text-white text-[10px] font-bold py-3 rounded-xl border border-white/10 uppercase">Withdraw</button>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <a href="https://t.me/Elitepayservice" class="glass-card p-6 flex flex-col items-center gap-3">
                    <svg class="w-6 h-6 text-yellow-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path></svg>
                    <span class="text-[10px] font-bold uppercase tracking-widest text-zinc-400">Support</span>
                </a>
                <a href="https://t.me/+f7Yx9ZeczwNhZGE1" class="glass-card p-6 flex flex-col items-center gap-3">
                    <svg class="w-6 h-6 text-yellow-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                    <span class="text-[10px] font-bold uppercase tracking-widest text-zinc-400">Network</span>
                </a>
            </div>
        </section>

        <section id="orders" class="tab-content p-6">
            <h3 class="text-sm font-bold gold-gradient mb-6 tracking-widest uppercase">Open Contracts</h3>
            <div id="orders-grid" class="grid grid-cols-2 gap-4"></div>
        </section>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 nav-blur flex justify-around p-5 z-50">
        <button onclick="showTab('home')" class="text-yellow-500"><svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011-1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"></path></svg></button>
        <button onclick="showTab('orders')" class="text-zinc-600"><svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M4 4a2 2 0 00-2 2v1h16V6a2 2 0 00-2-2H4z"></path><path fill-rule="evenodd" d="M18 9H2v5a2 2 0 002 2h12a2 2 0 002-2V9zM4 13a1 1 0 011-1h1a1 1 0 110 2H5a1 1 0 01-1-1zm5-1a1 1 0 100 2h1a1 1 0 100-2H9z" clip-rule="evenodd"></path></svg></button>
    </nav>

    <div id="pay-modal" class="fixed inset-0 bg-black/98 hidden z-[100] p-8 overflow-y-auto">
        <div class="flex justify-between items-center mb-10">
            <span class="text-xs font-bold text-zinc-500 uppercase tracking-widest">Secure Gateway</span>
            <button onclick="closePay()" class="text-white">✕</button>
        </div>
        <div class="glass-card p-6 mb-8 text-center">
            <img src="https://i.postimg.cc/CKcwgZ4P/IMG-20260317-110656-677.jpg" class="w-56 h-56 mx-auto rounded-2xl mb-6">
            <p class="text-[10px] text-zinc-500 uppercase font-bold mb-2">Merchant UPI ID</p>
            <p class="font-bold gold-text">elitepay@oksbi</p>
        </div>
        <input type="number" id="utr" placeholder="12-Digit Transaction ID (UTR)" class="w-full bg-white/5 border border-white/10 p-5 rounded-2xl outline-none focus:border-yellow-500 text-sm mb-6">
        <button onclick="submitOrder()" class="w-full gold-bg text-black font-black py-5 rounded-2xl uppercase text-xs tracking-widest">Verify Settlement</button>
    </div>

    <script>
        function login() {
            if(document.getElementById('phone').value.length < 10) return alert("Enter valid credentials");
            document.getElementById('auth-page').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
        }
        function showTab(t) {
            document.querySelectorAll('.tab-content').forEach(s => s.classList.remove('active'));
            document.getElementById(t).classList.add('active');
            document.querySelectorAll('nav button').forEach(b => b.classList.replace('text-yellow-500', 'text-zinc-600'));
            event.currentTarget.classList.replace('text-zinc-600', 'text-yellow-500');
        }
        function openPay() { document.getElementById('pay-modal').classList.remove('hidden'); }
        function closePay() { document.getElementById('pay-modal').classList.add('hidden'); }
        function submitOrder() {
            if(document.getElementById('utr').value.length < 12) return alert("Invalid UTR Reference");
            alert("Transaction Submitted for Verification"); closePay();
        }
        const grid = document.getElementById('orders-grid');
        for (let i = 0; i < 30; i++) {
            let v = 300 + (i * 162); if(v > 5000) v = 5000;
            grid.innerHTML += `
                <div class="glass-card p-6 flex flex-col items-center">
                    <p class="text-[8px] text-zinc-500 font-bold mb-1 uppercase tracking-widest">Entry</p>
                    <p class="text-xl font-black italic">₹${v}</p>
                    <p class="text-[9px] text-green-400 font-bold mt-1 mb-4">+₹${(v*0.045).toFixed(2)}</p>
                    <button onclick="openPay()" class="w-full bg-white/5 text-white text-[9px] font-black py-2 rounded-lg border border-white/10 uppercase hover:gold-bg hover:text-black transition-all">Settle</button>
                </div>`;
        }
    </script>
</body>
        </html>
